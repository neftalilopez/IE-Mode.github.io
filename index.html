<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Defender</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            font-family: Arial, sans-serif;
            color: white;
        }
        
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-image: url('/api/placeholder/800/1600');
            background-size: cover;
            overflow: hidden;
        }
        
        #player {
            position: absolute;
            width: 64px;
            height: 64px;
            background-size: contain;
            background-repeat: no-repeat;
            z-index: 10;
            transition: transform 0.1s ease-out;
        }
        
        /* Ship design with wings */
        .ship {
            clip-path: polygon(
                50% 0%,    /* Top point */
                0% 100%,   /* Bottom left */
                25% 70%,   /* Inner left */
                75% 70%,   /* Inner right */
                100% 100%  /* Bottom right */
            );
            background-color: #4444ff !important;
            box-shadow: 0 0 15px #88f;
        }
        
        /* Robot design */
        .robot {
            clip-path: polygon(
                30% 0%,    /* Top left */
                70% 0%,    /* Top right */
                100% 30%,  /* Right top */
                100% 70%,  /* Right bottom */
                70% 100%,  /* Bottom right */
                30% 100%,  /* Bottom left */
                0% 70%,    /* Left bottom */
                0% 30%     /* Left top */
            );
            background-color: #44ff44 !important;
            box-shadow: 0 0 15px #8f8;
        }
        
        .enemy {
            position: absolute;
            width: 50px;
            height: 50px;
            background-color: red;
            border-radius: 5px;
            background-size: contain;
            background-repeat: no-repeat;
        }
        
        .missile {
            position: absolute;
            width: 8px;
            height: 20px;
            background-color: #00ff00;
            border-radius: 4px;
            z-index: 5;
            box-shadow: 0 0 10px #0f0;
        }
        
        .bomb {
            position: absolute;
            width: 16px;
            height: 16px;
            background-color: #ff9900;
            border-radius: 50%;
            z-index: 5;
            box-shadow: 0 0 10px #f90;
        }
        
        .explosion {
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: transparent;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,165,0,0.8) 0%, rgba(255,0,0,0.6) 50%, rgba(0,0,0,0) 80%);
            z-index: 15;
            animation: expand 0.5s ease-out forwards;
        }
        
        @keyframes expand {
            0% {
                transform: scale(0.2);
                opacity: 1;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }
        
        #gameStats {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 5px;
            z-index: 20;
        }
        
        #controls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            padding: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 5px;
            font-size: 14px;
            z-index: 20;
        }
        
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
            display: none;
        }
        
        #gameOverScreen h1 {
            color: #ff0000;
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        #gameOverScreen button {
            padding: 15px 30px;
            font-size: 24px;
            background-color: #107C10;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
        }
        
        #startScreen h1 {
            color: #00ff00;
            font-size: 48px;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 0 0 10px #0f0;
        }
        
        #startScreen button {
            padding: 15px 30px;
            font-size: 24px;
            background-color: #107C10;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        #startScreen button:hover {
            background-color: #1aaa1a;
            transform: scale(1.05);
        }
        
        .powerup {
            position: absolute;
            width: 30px;
            height: 30px;
            background-color: #00ffff;
            border-radius: 50%;
            z-index: 5;
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 15px #0ff;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        #soundToggle {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 5px;
            z-index: 20;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="player"></div>
        
        <div id="gameStats">
            Score: <span id="score">0</span> | 
            Lives: <span id="lives">3</span> | 
            Mode: <span id="mode">Ship</span>
        </div>
        
        <div id="controls">
            <p>D-Pad: Move</p>
            <p>Left Bumper (200): Fire Missile</p>
            <p>Right Bumper (199): Drop Bomb</p>
            <p>Copy Button (208): Transform</p>
        </div>
        
        <div id="soundToggle">🔊 Sound & Music: ON</div>
        
        <div id="startScreen">
            <h1>COSMIC DEFENDER</h1>
            <p>D-Pad to move, buttons to attack</p>
            <button id="startButton">START GAME</button>
        </div>
        
        <div id="gameOverScreen">
            <h1>GAME OVER</h1>
            <p>Final Score: <span id="finalScore">0</span></p>
            <button id="restartButton">Play Again</button>
        </div>
    </div>
    
    <script>
        // Game variables
        let player;
        let gameContainer;
        let score = 0;
        let lives = 3;
        let gameRunning = false;
        let playerMode = 'ship'; // 'ship' or 'robot'
        let soundEnabled = true; // Sound toggle
        
        // Audio objects
        const sounds = {
            missile: new Audio(),
            bomb: new Audio(),
            explosion: new Audio(),
            powerup: new Audio(),
            playerHit: new Audio(),
            transform: new Audio(),
            gameStart: new Audio(),
            gameOver: new Audio(),
            background: new Audio()
        };
        
        // Initialize sound sources
        sounds.missile.src = "https://cdnjs.cloudflare.com/ajax/libs/sound-effects/1.0.2/laser.mp3";
        sounds.bomb.src = "https://cdnjs.cloudflare.com/ajax/libs/sound-effects/1.0.2/bomb.mp3";
        sounds.explosion.src = "https://cdnjs.cloudflare.com/ajax/libs/sound-effects/1.0.2/explosion.mp3";
        sounds.powerup.src = "https://cdnjs.cloudflare.com/ajax/libs/sound-effects/1.0.2/powerup.mp3";
        sounds.playerHit.src = "https://cdnjs.cloudflare.com/ajax/libs/sound-effects/1.0.2/hit.mp3";
        sounds.transform.src = "https://cdnjs.cloudflare.com/ajax/libs/sound-effects/1.0.2/transform.mp3";
        sounds.gameStart.src = "https://cdnjs.cloudflare.com/ajax/libs/sound-effects/1.0.2/start.mp3";
        sounds.gameOver.src = "https://cdnjs.cloudflare.com/ajax/libs/sound-effects/1.0.2/gameover.mp3";
        sounds.background.src = "https://cdnjs.cloudflare.com/ajax/libs/sound-effects/1.0.2/bg-music.mp3";
        
        // Configure background music for looping
        sounds.background.volume = 0.5; // Lower volume for background music
        sounds.background.loop = true;
